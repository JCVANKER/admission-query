# 录取查询系统 - Nginx 配置
# 将此文件复制到 /etc/nginx/sites-available/admission-query
# 然后运行: sudo ln -s /etc/nginx/sites-available/admission-query /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    # ⚠️ 将 your-domain.com 替换为你的域名，或直接使用服务器 IP
    server_name your-domain.com;

    # 静态文件直接由 Nginx 处理
    location /static/ {
        alias /opt/admission-query/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 所有其他请求转发给 Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
