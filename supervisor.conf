# 录取查询系统 - Supervisor 配置
# 将此文件复制到 /etc/supervisor/conf.d/admission-query.conf
# 然后运行: sudo supervisorctl reread && sudo supervisorctl update

[program:admission-query]
command=/usr/local/bin/gunicorn -w 4 -b 127.0.0.1:8000 app:app
directory=/opt/admission-query
user=root
autostart=true
autorestart=true
stdout_logfile=/var/log/admission-query.log
stderr_logfile=/var/log/admission-query.log
environment=SECRET_KEY="change-me-random-key",ADMIN_USERNAME="admin",ADMIN_PASSWORD="admin123456"
