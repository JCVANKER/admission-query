<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>英才计划</title>
    <link rel="stylesheet" href="/static/css/invite-theme.css?v={{ app_version }}">
</head>
<body>
    <div class="invite-page">
        <!-- 顶部红色区域 -->
        <div class="invite-header">
            <img src="/static/img/logo.png?v={{ app_version }}" alt="北大-点猫科技" class="invite-logo">
            <h2 class="invite-sub-title">英才计划</h2>
            <h1 class="invite-main-title">入学邀请函</h1>
        </div>

        <!-- 米色内容区 -->
        <div class="invite-body">
            <p class="invite-student"><strong>{{ student_name }}</strong> 同学</p>
            <p class="invite-text">经教学中心审核，恭喜你在北大-点猫人工智能教育联合实验室人才选拔中获得：</p>
            <div class="invite-badge">{{ badge_text }}</div>
            <p class="invite-welcome">关注编程猫官方直播间，领取英才计划学员优惠</p>
            <p class="invite-hint">（请截图反馈给老师，于官方入学通道开启后确认入学信息）</p>

            <!-- 培养需求 -->
            <div class="invite-needs" id="needsSection" style="display:none;">
                <p class="needs-label">已选培养需求</p>
                <div class="needs-tags" id="needsTags"></div>
            </div>

            <!-- 底部信息 + 印章 -->
            <div class="invite-bottom">
                <span class="invite-date" id="liveDate">{{ today_date }}</span>
                <div class="invite-stamp">
                    <div class="stamp-circle">
                        <span class="stamp-text">英才计划</span>
                        <span class="stamp-sub">教学中心</span>
                    </div>
                </div>
                <span class="invite-company">深圳点猫科技有限公司</span>
            </div>
        </div>

        <!-- 截图分享引导 -->
        <div class="screenshot-guide" id="screenshotGuide">
            <div class="guide-arrow">⬆</div>
            <div class="guide-text">截图分享给老师</div>
        </div>

        <!-- 确定按钮 -->
        <button class="invite-btn" onclick="window.location.href='/{{ class_type }}'">确定</button>
    </div>

    <script>
        // 左下角显示实时日期
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        document.getElementById('liveDate').textContent = `${year}年${month}月${day}日`;

        // 显示培养需求
        const urlParams = new URLSearchParams(window.location.search);
        const needs = urlParams.get('needs');
        if (needs) {
            const needsSection = document.getElementById('needsSection');
            const needsTags = document.getElementById('needsTags');
            const needsList = needs.split(',');
            needsTags.innerHTML = needsList.map(n => `<span class="need-tag">${n}</span>`).join('');
            needsSection.style.display = 'block';
        }

        // 截图引导：3秒后自动淡出
        setTimeout(() => {
            const guide = document.getElementById('screenshotGuide');
            if (guide) guide.classList.add('fade-out');
        }, 4000);
    </script>
</body>
</html>
