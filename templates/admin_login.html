<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 录取查询系统</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ app_version }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-icon">🔐</div>
            <h1>管理员登录</h1>
            <p class="subtitle">录取查询系统后台管理</p>
        </header>

        <div class="query-card">
            <div class="query-form" id="loginForm">
                <div class="input-group">
                    <label for="usernameInput">
                        <span class="label-icon">👤</span> 管理员账号
                    </label>
                    <input
                        type="text"
                        id="usernameInput"
                        placeholder="请输入管理员账号"
                        autocomplete="off"
                        autofocus
                    >
                </div>
                <div class="input-group">
                    <label for="passwordInput">
                        <span class="label-icon">🔑</span> 管理员密码
                    </label>
                    <input
                        type="password"
                        id="passwordInput"
                        placeholder="请输入密码"
                        autocomplete="off"
                    >
                </div>
                <button class="btn-query" type="button" onclick="doLogin()">
                    <span>🔓</span> 登 录
                </button>
                <p class="form-hint" id="loginMsg" style="display:none;"></p>
            </div>
        </div>

        <footer class="footer">
            <p><a href="/">← 返回查询首页</a></p>
        </footer>
    </div>

    <script>
        async function doLogin() {
            const btn = document.querySelector('.btn-query');
            const msg = document.getElementById('loginMsg');
            msg.style.display = 'none';

            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();

            if (!username || !password) {
                msg.style.display = 'block';
                msg.style.color = '#e74c3c';
                msg.textContent = '请输入账号和密码';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span> 登录中...';

            try {
                const resp = await fetch('/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, password })
                });
                const data = await resp.json();
                if (data.success) {
                    window.location.href = '/admin/dashboard';
                } else {
                    msg.style.display = 'block';
                    msg.style.color = '#e74c3c';
                    msg.textContent = data.message || '登录失败';
                }
            } catch (err) {
                msg.style.display = 'block';
                msg.style.color = '#e74c3c';
                msg.textContent = '网络错误，请重试';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>🔓</span> 登 录';
            }
        }

        // 回车键触发登录
        document.getElementById('passwordInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doLogin();
        });
        document.getElementById('usernameInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>
