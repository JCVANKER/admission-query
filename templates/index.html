<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>录取结果查询</title>
    <link rel="stylesheet" href="/static/css/query-theme.css?v={{ app_version }}">
</head>
<body>
    <div class="page">
        <!-- 顶部 Logo 区域 -->
        <header class="top-bar">
            <img src="/static/img/logo.png?v={{ app_version }}" alt="北大-点猫科技人工智能教育联合实验室" class="logo-img">
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="title-group">
                <p class="sub-title">编程猫在线教育中心</p>
                <h1 class="main-title">{{ page_title }}</h1>
                <p class="hint-text">输入学员姓名，查看本次选拔录取结果</p>
            </div>

            <!-- 查询表单卡片 -->
            <div class="form-card">
                <div class="form-group">
                    <label for="nameInput" class="form-label">学员姓名</label>
                    <input
                        type="text"
                        id="nameInput"
                        class="form-input"
                        placeholder="请输入学员姓名"
                        autocomplete="off"
                        autofocus
                    >
                </div>
                <!-- 验证码 -->
                <div class="form-group captcha-group">
                    <label class="form-label">验证码</label>
                    <div class="captcha-row">
                        <span class="captcha-expr" id="captchaExpr">加载中...</span>
                        <input
                            type="text"
                            id="captchaInput"
                            class="form-input captcha-input"
                            placeholder="请输入结果"
                            autocomplete="off"
                            maxlength="3"
                            inputmode="numeric"
                        >
                        <button type="button" class="captcha-refresh" id="captchaRefresh" title="换一个验证码">🔄</button>
                    </div>
                </div>
                <button class="btn-submit" id="queryBtn" onclick="doQuery()">
                    查询录取结果
                </button>
            </div>
        </main>

        <!-- 结果区域 -->
        <div class="result-area" id="resultArea" style="display:none;">
            <div class="result-card" id="resultCard"></div>
        </div>
    </div>

    <script src="/static/js/main.js?v={{ app_version }}"></script>
    <script>
        // 向 main.js 传递当前班型
        window.APP_CLASS_TYPE = '{{ class_type }}';
    </script>
</body>
</html>
