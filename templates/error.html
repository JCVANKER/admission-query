<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ code }} - 英才计划</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; -webkit-text-size-adjust: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                         "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #eef2ff 0%, #f0f9ff 40%, #fdf2f8 100%);
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }
        .error-card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 36px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #e2e8f0;
            animation: fadeInUp 0.4s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-icon-wrap {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
        }
        .error-icon-wrap.not-found {
            background: #eff6ff;
        }
        .error-icon-wrap.server-error {
            background: #fef2f2;
        }
        .error-code {
            font-size: 1rem;
            font-weight: 700;
            color: #64748b;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .error-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1e293b;
        }
        .error-message {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 28px;
            line-height: 1.7;
        }
        .error-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 11px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .error-btn.primary {
            color: #fff;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
        }
        .error-btn.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(79, 70, 229, 0.35);
        }
        .error-btn.secondary {
            color: #4f46e5;
            background: #f5f3ff;
            border: 1px solid #ddd6fe;
        }
        .error-btn.secondary:hover {
            background: #ede9fe;
        }
        @media (max-width: 480px) {
            .error-card {
                padding: 36px 24px;
            }
            .error-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon-wrap {{ 'not-found' if code == 404 else 'server-error' }}">
            {{ '🔍' if code == 404 else '⚠️' }}
        </div>
        <div class="error-code">Error {{ code }}</div>
        <h1 class="error-title">{{ message }}</h1>
        <p class="error-message">
            {{ '您访问的页面不存在或已被移除，请检查链接是否正确。' if code == 404 else '服务器遇到了意外错误，请稍后重试。如问题持续存在，请联系技术支持。' }}
        </p>
        <div class="error-actions">
            <a href="/" class="error-btn primary">← 返回首页</a>
            {% if code == 404 %}
            <a href="javascript:history.back()" class="error-btn secondary">返回上页</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
